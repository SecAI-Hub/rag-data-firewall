version: 1

# Default action when no rule matches (deny-by-default).
default_action: deny

# Rules are evaluated in order. First match wins (firewall semantics).
# Place deny rules before allow rules for defense-in-depth.
rules:
  # --- Safety rules (highest priority) ---

  - name: block-prompt-injection
    description: "Always block chunks with detected prompt injection"
    match:
      scan_prompt_injection: true
    action: deny
    reason: "prompt injection detected in chunk content"

  - name: block-high-risk
    description: "Block chunks with risk score above threshold"
    match:
      min_risk_score: 0.8
    action: deny
    reason: "chunk risk score exceeds threshold"

  # --- Access control rules ---

  - name: deny-tools-restricted
    description: "Restricted documents are never available to automated tools"
    match:
      sensitivity: [restricted]
      requester_type: [tool]
    action: deny
    reason: "restricted documents not available to automated tools"

  - name: require-approval-restricted
    description: "Restricted documents require operator approval for users"
    match:
      sensitivity: [restricted]
      requester_type: [user]
    action: require-approval
    reason: "restricted documents require explicit operator approval"

  - name: redact-confidential-low-trust
    description: "Redact PII from confidential docs in low-trust sessions"
    match:
      sensitivity: [confidential]
      session_trust: [low]
    action: redact
    redact_patterns: [email, ssn, phone, credential]

  - name: allow-confidential-high-trust
    description: "Allow confidential docs for high-trust user sessions"
    match:
      sensitivity: [confidential]
      requester_type: [user]
      session_trust: [high]
    action: allow

  - name: redact-confidential-default
    description: "Redact confidential docs by default"
    match:
      sensitivity: [confidential]
    action: redact
    redact_patterns: [email, ssn, phone]

  - name: allow-internal-users
    description: "Internal documents available to users"
    match:
      sensitivity: [internal]
      requester_type: [user]
    action: allow

  - name: allow-internal-tools-high-trust
    description: "Internal documents available to tools in high-trust sessions"
    match:
      sensitivity: [internal]
      requester_type: [tool]
      session_trust: [high]
    action: allow

  - name: allow-public
    description: "Public documents available to everyone"
    match:
      sensitivity: [public]
    action: allow

# Scanner configuration
scanner:
  prompt_injection: true
  pii_detection: true
  suspicious_patterns: true
  min_risk_to_flag: 0.5

# Data directory
data_dir: /var/lib/secure-ai/rag

# Daemon settings
daemon:
  bind_addr: "127.0.0.1:8500"

# Rate limiting
rate_limit:
  requests_per_minute: 120
